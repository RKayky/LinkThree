<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkThree</title>

    <link rel="stylesheet" href="/Pcss/style.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
     <div class="container">
        <div class="container-imagem">
            <div class="img"></div>
            <p><b> Ryan Kayky </b></p>
            <p> Sou Estudante de Ciência de Computação e aqui está alguns links de contatos</p>
        </div>
        
        <div class="container-botao">
            <div class="botao">
                <i class="fa-brands fa-linkedin"></i>
                <p> Linkedin </p>
            </div>

            <div class="botao">
                <i class="fa-brands fa-github"></i>
                <p> GitHub </p>
            </div>

            <div class="botao">
                <i class="fa-solid fa-circle-info"></i>
                <p> Sobre </p>
            </div>

            <div class="botao">
                <i class="fa-solid fa-phone"></i>
                <p> Contato </p>
            </div>
        </div>

        <footer onclick="location.href='ryan.kayky10@gmail.com'">
            <i class="fa-regular fa-envelope"></i>
            <div class="footer-texto">
                <h2>Junte-se a minha comunidade.</h2>
                <p>Fique por dentro das novidades enviando um e-mail.</p>
            </div>
        </footer>

     </div>
</body>
</html>
